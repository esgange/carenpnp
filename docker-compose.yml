services:
  dobot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: dobot-pickn-place:humble
    container_name: dobot_pickn_place
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /workspaces/DOBOT_pickn_place
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - SOURCE_WORKSPACE=1
    volumes:
      - ./:/workspaces/DOBOT_pickn_place
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
